{% extends 'base.html' %}
{% block title %}Unit Registration - Uzuri{% endblock %}
{% block content %}
  <div class="bg-white p-4 rounded shadow">
    <h2 class="text-2xl font-semibold">Unit Registration</h2>
    <p class="text-sm text-gray-500">Interactive unit selection and registration progress.</p>
    <div class="mt-4 grid grid-cols-1 lg:grid-cols-3 gap-4">
      <div class="col-span-2">
        <div class="p-4 border rounded">
          <div id="unit-picker">
            <!-- Unit picker UI: courses list, search, add/remove -->
            <p class="text-gray-500">Unit picker will load here via API/HTMX.</p>
          </div>
        </div>
      </div>
      <aside>
        <div class="p-4 border rounded">
          <h4 class="font-medium">Progress</h4>
          <div class="mt-3">
            <div class="w-full bg-gray-200 rounded h-4">
              <div class="bg-blue-600 h-4 rounded" style="width:40%"></div>
            </div>
            <div class="text-sm text-gray-500 mt-2">40% complete</div>
          </div>
        </div>
      </aside>
    </div>
  </div>
{% endblock %}
