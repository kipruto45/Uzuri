name: Frontend CI Tests

on:
  push:
    branches: [ main, ci-frontend-tests ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install deps
        run: |
          cd frontend
          npm ci --legacy-peer-deps
      - name: Run Jest tests
        run: |
          cd frontend
          npm test -- --ci --runInBand

  cypress-api:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install deps
        run: |
          cd frontend
          npm ci --legacy-peer-deps
      - name: Run Cypress API-only tests
        env:
          CYPRESS_baseUrl: ${{ secrets.CYPRESS_BASE_URL }}
          API_TOKEN: ${{ secrets.API_TOKEN }}
        run: |
          cd frontend
          # ensure cypress has access to base URL and token for API-only tests
          npx cypress run --spec "cypress/e2e/api_upload_spec.cy.js"
